<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗黑赛博科技风｜独立站预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.dark-bg{background:#0A0A0A}
.cyber-card{border:1px solid rgba(60,200,200,.15);border-radius:20px;background:rgba(30,30,30,.4);transition:all .3s ease}
.cyber-card:hover{border-color:rgba(60,200,200,.4);box-shadow:0 0 20px rgba(60,200,200,.15)}
.text-cyber{color:#3CC8C8}
</style>
</head>
<body class="dark-bg min-h-screen text-gray-200 px-6 py-16">
<div class="max-w-6xl mx-auto text-center">
<h1 class="text-5xl font-bold mb-6"><span class="text-cyber">赛博科技</span> 未来设计</h1>
<p class="text-gray-400 text-lg max-w-2xl mx-auto mb-12">暗黑基底+霓虹微光，打造极客、未来、黑科技品牌质感</p>
<div class="grid md:grid-cols-3 gap-6">
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">微光氛围</h3><p class="text-gray-400">柔和霓虹不刺眼</p></div>
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">未来科技</h3><p class="text-gray-400">Web3/AI专属调性</p></div>
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">高级暗黑</h3><p class="text-gray-400">沉浸式视觉体验</p></div>
</div>
</div>
</body>
</html>
