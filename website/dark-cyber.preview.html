<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Cyber Tech | Website Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.dark-bg{background:#0A0A0A}
.cyber-card{border:1px solid rgba(60,200,200,.15);border-radius:20px;background:rgba(30,30,30,.4);transition:all .3s ease}
.cyber-card:hover{border-color:rgba(60,200,200,.4);box-shadow:0 0 20px rgba(60,200,200,.15)}
.text-cyber{color:#3CC8C8}
</style>
</head>
<body class="dark-bg min-h-screen text-gray-200 px-6 py-16">
<div class="max-w-6xl mx-auto text-center">
<h1 class="text-5xl font-bold mb-6"><span class="text-cyber">Cyber Tech</span> Future Design</h1>
<p class="text-gray-400 text-lg max-w-2xl mx-auto mb-12">Dark base + neon micro-glow, crafting geeky, futuristic, black-tech brand aesthetics</p>
<div class="grid md:grid-cols-3 gap-6">
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">Micro-Glow Ambiance</h3><p class="text-gray-400">Soft neon, easy on the eyes</p></div>
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">Future Tech</h3><p class="text-gray-400">Exclusive vibe for Web3/AI</p></div>
<div class="cyber-card p-8"><h3 class="text-xl font-bold text-cyber mb-3">Premium Dark</h3><p class="text-gray-400">Immersive visual experience</p></div>
</div>
</div>
</body>
</html>
