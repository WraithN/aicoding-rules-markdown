<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple极简留白风｜独立站预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#fff;color:#000}
.section{padding:120px 0}
.h1-apple{font-size:clamp(48px,6vw,80px);font-weight:600;line-height:1.1;letter-spacing:-0.02em}
.btn-black{background:#000;color:#fff;border-radius:9999px;padding:18px 40px;transition:opacity .2s}
.btn-black:hover{opacity:.8}
.btn-line{border:1px solid #e5e5e5;border-radius:9999px;padding:18px 40px;background:transparent}
</style>
</head>
<body>
<nav class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
<span class="text-xl font-semibold">Pure Design</span>
<div class="hidden md:flex gap-10 text-sm text-gray-500"><a href="#">产品</a><a href="#">体验</a><a href="#">关于</a></div>
</nav>
<section class="max-w-7xl mx-auto px-6 section text-center">
<h1 class="h1-apple mb-8">简约之上，<br/>皆是高级</h1>
<p class="text-gray-500 text-xl max-w-xl mx-auto mb-12 leading-relaxed">剔除所有冗余装饰，用留白与排版，定义高端产品质感。</p>
<div class="flex justify-center gap-6">
<button class="btn-black">了解产品</button>
<button class="btn-line">观看介绍</button>
</div>
</section>
<section class="max-w-7xl mx-auto px-6 pb-32 grid md:grid-cols-3 gap-16 text-center">
<div><h3 class="text-2xl font-semibold mb-4">极致留白</h3><p class="text-gray-500">空间呼吸感拉满</p></div>
<div><h3 class="text-2xl font-semibold mb-4">纯粹视觉</h3><p class="text-gray-500">无多余渐变与特效</p></div>
<div><h3 class="text-2xl font-semibold mb-4">长效耐看</h3><p class="text-gray-500">常年不过时高端风格</p></div>
</section>
</body>
</html>
