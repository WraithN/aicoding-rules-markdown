<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新粗野主义风｜独立站预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.brutal-card{border:2px solid #000;box-shadow:6px 6px 0 #000;transition:all .2s ease}
.brutal-card:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 #000}
.brutal-btn{border:2px solid #000;box-shadow:4px 4px 0 #000;transition:all .2s ease}
.brutal-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000}
</style>
</head>
<body class="bg-yellow-50 min-h-screen p-8">
<div class="max-w-5xl mx-auto">
<h1 class="text-6xl font-black mb-6">NEO BRUTALISM</h1>
<p class="text-lg mb-10 max-w-2xl">粗野、直接、叛逆、年轻｜Z世代顶级潮流设计风格</p>
<div class="grid md:grid-cols-3 gap-6">
<div class="brutal-card bg-white p-6 rounded-none"><h3 class="text-xl font-bold mb-2">粗黑描边</h3><p>强硬视觉边界</p></div>
<div class="brutal-card bg-blue-100 p-6 rounded-none"><h3 class="text-xl font-bold mb-2">错位阴影</h3><p>复古立体质感</p></div>
<div class="brutal-card bg-orange-100 p-6 rounded-none"><h3 class="text-xl font-bold mb-2">高饱和撞色</h3><p>超强视觉记忆点</p></div>
</div>
<button class="brutal-btn mt-10 px-8 py-3 bg-black text-white font-bold">立即体验</button>
</div>
</body>
</html>
