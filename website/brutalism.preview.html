<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Brutalism | Website Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.brutal-card{border:2px solid #000;box-shadow:6px 6px 0 #000;transition:all .2s ease}
.brutal-card:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 #000}
.brutal-btn{border:2px solid #000;box-shadow:4px 4px 0 #000;transition:all .2s ease}
.brutal-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000}
</style>
</head>
<body class="bg-yellow-50 min-h-screen p-8">
<div class="max-w-5xl mx-auto">
<h1 class="text-6xl font-black mb-6">NEO BRUTALISM</h1>
<p class="text-lg mb-10 max-w-2xl">Raw, direct, rebellious, youthful | The ultimate Gen Z trend design style</p>
<div class="grid md:grid-cols-3 gap-6">
<div class="brutal-card bg-white p-6 rounded-none"><h3 class="text-xl font-bold mb-2">Bold Black Outlines</h3><p>Strong visual boundaries</p></div>
<div class="brutal-card bg-blue-100 p-6 rounded-none"><h3 class="text-xl font-bold mb-2">Offset Shadows</h3><p>Retro 3D texture</p></div>
<div class="brutal-card bg-orange-100 p-6 rounded-none"><h3 class="text-xl font-bold mb-2">High-Saturation Color Clash</h3><p>Super strong visual memorability</p></div>
</div>
<button class="brutal-btn mt-10 px-8 py-3 bg-black text-white font-bold">Experience Now</button>
</div>
</body>
</html>
