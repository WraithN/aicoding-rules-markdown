<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalism Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            .minimal-border {
                border: 0.5px solid rgba(0, 0, 0, 0.08);
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <span class="px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm font-medium">05</span>
            <h2 class="text-xl font-bold">Minimalism 2.0</h2>
            <span class="text-gray-400 text-sm">Generous White Space / Ultimate Simplicity</span>
        </div>
        <p class="text-gray-500 mb-6 text-sm">Generous white space, ultra-thin borders, neutral tones, large typography.</p>
        <div class="bg-white p-12 rounded-3xl border border-gray-100">
            <div class="max-w-md mx-auto">
                <div class="text-center mb-12">
                    <div class="w-12 h-12 mx-auto mb-6 minimal-border rounded-xl flex items-center justify-center">
                        <i class="fa fa-paper-plane text-gray-400"></i>
                    </div>
                    <h2 class="text-2xl font-light mb-2">Welcome Back</h2>
                    <p class="text-gray-400 text-sm">Sign in to your account to continue</p>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-gray-400 block mb-2">Email Address</label>
                        <input type="email" class="w-full py-3 border-b border-gray-200 focus:border-gray-400 outline-none transition-colors bg-transparent" placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-2">Password</label>
                        <input type="password" class="w-full py-3 border-b border-gray-200 focus:border-gray-400 outline-none transition-colors bg-transparent" placeholder="••••••••">
                    </div>
                </div>
                <button class="w-full mt-8 py-4 bg-black text-white rounded-full hover:bg-gray-800 transition-colors font-medium">Sign In</button>
                <p class="text-center text-gray-400 text-xs mt-6">Don't have an account?<a href="#" class="text-black underline">Sign Up Now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
