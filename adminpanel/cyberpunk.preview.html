<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            pink: '#ff2a6d', cyan: '#05d9e8', purple: '#d300c5',
                            yellow: '#fee800', dark: '#120458'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .cyber-glow {
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
            }
            .cyber-border {
                border: 1px solid #05d9e8;
                box-shadow: 0 0 5px #05d9e8, inset 0 0 5px rgba(5, 217, 232, 0.1);
            }
            .cyber-btn {
                background: linear-gradient(135deg, #ff2a6d, #d300c5);
                box-shadow: 0 0 20px rgba(255, 42, 109, 0.5);
                clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            }
            .scanline {
                background: linear-gradient(transparent 50%, rgba(5, 217, 232, 0.03) 50%);
                background-size: 100% 4px;
                pointer-events: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <span class="px-3 py-1 bg-pink-100 text-pink-700 rounded-full text-sm font-medium">03</span>
            <h2 class="text-xl font-bold">Cyberpunk</h2>
            <span class="text-gray-400 text-sm">Neon / Glitch Art / High Contrast</span>
        </div>
        <p class="text-gray-500 mb-6 text-sm">High-saturation neon colors, glow effects, beveled corners, scanlines.</p>
        <div class="bg-cyber-dark p-8 rounded-3xl relative overflow-hidden">
            <div class="absolute inset-0 scanline z-10"></div>
            <div class="relative flex gap-8 items-center flex-wrap">
                <div class="cyber-border rounded-lg p-6 w-72">
                    <h3 class="text-cyber-cyan font-bold text-lg cyber-glow mb-4">
                        <i class="fa fa-plug mr-2"></i>NEURAL LINK
                    </h3>
                    <div class="space-y-3 mb-6">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">System Status</span>
                            <span class="text-cyber-cyan">ONLINE</span>
                        </div>
                        <div class="h-1 bg-gray-800 rounded overflow-hidden">
                            <div class="h-full w-3/4 bg-cyber-cyan shadow-[0_0_10px_#05d9e8]"></div>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">Memory Capacity</span>
                            <span class="text-cyber-pink">78%</span>
                        </div>
                    </div>
                    <button class="cyber-btn w-full py-3 text-white font-bold tracking-wider">Initiate Connection</button>
                </div>
                <div class="text-center">
                    <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyber-pink via-cyber-purple to-cyber-cyan cyber-glow mb-2">CYBER</div>
                    <div class="text-cyber-yellow text-sm tracking-[0.3em]">2077 // NIGHT CITY</div>
                    <div class="mt-4 flex gap-4 justify-center">
                        <span class="w-3 h-3 rounded-full bg-cyber-pink shadow-[0_0_10px_#ff2a6d] animate-pulse"></span>
                        <span class="w-3 h-3 rounded-full bg-cyber-cyan shadow-[0_0_10px_#05d9e8] animate-pulse"></span>
                        <span class="w-3 h-3 rounded-full bg-cyber-purple shadow-[0_0_10px_#d300c5] animate-pulse"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
