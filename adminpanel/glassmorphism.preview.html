<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                background: rgba(255, 255, 255, 0.25);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.18);
                box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            }
            .glass-dark {
                background: rgba(15, 23, 42, 0.7);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <span class="px-3 py-1 bg-cyan-100 text-cyan-700 rounded-full text-sm font-medium">02</span>
            <h2 class="text-xl font-bold">Glassmorphism</h2>
            <span class="text-gray-400 text-sm">Frosted Glass / Transparent</span>
        </div>
        <p class="text-gray-500 mb-6 text-sm">Semi-transparent background + blur + thin border creates a sense of layering and depth.</p>
        <div class="relative p-12 rounded-3xl overflow-hidden bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">
            <div class="absolute top-10 left-10 w-32 h-32 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
            <div class="absolute top-20 right-10 w-40 h-40 bg-cyan-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
            <div class="absolute bottom-10 left-1/3 w-36 h-36 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
            <div class="relative flex gap-6 flex-wrap">
                <div class="glass-card rounded-2xl p-6 w-72 text-white">
                    <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center mb-4">
                        <i class="fa fa-wallet text-xl"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-1">Web3 Wallet</h3>
                    <p class="text-white/60 text-sm mb-4">Connect your wallet</p>
                    <div class="text-3xl font-bold mb-4">2.45 ETH</div>
                    <button class="w-full py-3 rounded-xl bg-white/20 hover:bg-white/30 transition-colors font-medium">Connect Wallet</button>
                </div>
                <div class="glass-dark rounded-2xl p-6 w-72 text-white">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-white/60 text-sm">Total Balance</span>
                        <span class="text-cyan-400 text-xs">+12.5%</span>
                    </div>
                    <div class="text-2xl font-bold mb-6">$ 24,589.00</div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-xs">BTC</div>
                                <span class="text-sm">Bitcoin</span>
                            </div>
                            <span class="text-sm font-medium">0.42</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs">ETH</div>
                                <span class="text-sm">Ethereum</span>
                            </div>
                            <span class="text-sm font-medium">2.45</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
