<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Glass App | Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>tailwind.config={theme:{extend:{colors:{aurora:{purple:'#7877C6',blue:'#5B8DEF'}}}}}</script>
<style>
.app-bg{background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(120,119,198,.2),transparent),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(91,141,239,.15),transparent),#FAFAFA}
.app-glass{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.7);border-radius:20px;transition:all .2s ease}
</style>
</head>
<body class="app-bg min-h-screen p-5 max-w-md mx-auto">
<div class="flex justify-between items-center mb-8">
<div><p class="text-gray-400 text-sm">Welcome Back</p><h2 class="text-xl font-bold">AI Smart Assistant</h2></div>
<div class="w-10 h-10 rounded-full app-glass flex items-center justify-center"><i class="fa fa-user text-aurora-purple"></i></div>
</div>
<div class="app-glass p-6 mb-6"><h3 class="text-lg font-bold text-aurora-purple mb-2">Smart Analysis</h3><p class="text-gray-500 text-sm mb-4">One-click AI intelligent content processing</p><div class="flex gap-3"><button class="flex-1 py-3 rounded-xl bg-aurora-purple/10 text-aurora-purple text-sm">Start Analysis</button><button class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-600 text-sm">View Records</button></div></div>
<div class="grid grid-cols-2 gap-4">
<div class="app-glass p-5 text-center"><i class="fa fa-magic text-aurora-purple text-xl mb-2"></i><p class="text-sm">Smart Creation</p></div>
<div class="app-glass p-5 text-center"><i class="fa fa-search text-aurora-blue text-xl mb-2"></i><p class="text-sm">Smart Search</p></div>
<div class="app-glass p-5 text-center"><i class="fa fa-image text-green-500 text-xl mb-2"></i><p class="text-sm">Image Generation</p></div>
<div class="app-glass p-5 text-center"><i class="fa fa-microphone text-red-400 text-xl mb-2"></i><p class="text-sm">Voice Assistant</p></div>
</div>
</body>
</html>
