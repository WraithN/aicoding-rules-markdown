<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Neon Cyberpunk | App Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
.cyber-bg{background:#0A0A0F;color:#e5e5e5;font-family:'Orbitron',sans-serif}
.cyber-card{background:rgba(20,20,30,.8);border:1px solid rgba(5,217,232,.2);border-radius:16px;backdrop-filter:blur(10px)}
.cyber-glow{text-shadow:0 0 10px currentColor,0 0 20px currentColor}
.cyber-btn{background:linear-gradient(135deg,#FF2A6D,#D300C5);border-radius:12px;box-shadow:0 0 15px rgba(255,42,109,.4)}
.cyber-border{border:1px solid #05D9E8;box-shadow:0 0 5px #05D9E8,inset 0 0 5px rgba(5,217,232,.1)}
</style>
</head>
<body class="cyber-bg min-h-screen p-6 max-w-md mx-auto">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-cyan-400 cyber-glow mb-2">CYBER APP</h1>
<p class="text-gray-500 text-sm">NEON NIGHTS // 2077</p>
</div>
<div class="cyber-card p-6 mb-6">
<div class="flex justify-between items-center mb-4">
<span class="text-gray-400 text-sm">System Status</span>
<span class="text-cyan-400 text-sm cyber-glow">ONLINE</span>
</div>
<div class="h-1 bg-gray-800 rounded mb-2"><div class="h-full w-3/4 bg-cyan-400 rounded shadow-[0_0_10px_#05d9e8]"></div></div>
<div class="flex justify-between text-xs text-gray-500">
<span>CPU</span><span>78%</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="cyber-border p-4 rounded-xl text-center">
<i class="fa fa-gamepad text-pink-500 text-2xl mb-2 cyber-glow"></i>
<div class="text-sm">Gaming</div>
</div>
<div class="cyber-border p-4 rounded-xl text-center">
<i class="fa fa-rocket text-cyan-400 text-2xl mb-2 cyber-glow"></i>
<div class="text-sm">Boost</div>
</div>
</div>
<button class="cyber-btn w-full py-4 font-bold tracking-wider">INITIATE</button>
</body>
</html>
