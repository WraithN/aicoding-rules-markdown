<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rounded Healing Card Style | App Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
.heal-bg{background:#FFF9F5;min-height:100vh}
.heal-card{background:#fff;border-radius:28px;box-shadow:0 4px 20px rgba(0,0,0,.04);padding:24px}
.heal-btn{background:#FFB5B5;border-radius:24px;color:#fff;padding:14px 32px;font-weight:600;box-shadow:0 4px 12px rgba(255,181,181,.3)}
.heal-tag{background:#B5D8FF;border-radius:20px;padding:6px 16px;font-size:12px;color:#4A4A4A}
.heal-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFB5B5,#B5D8FF)}
</style>
</head>
<body class="heal-bg max-w-md mx-auto">
<div class="p-6">
<div class="flex items-center gap-4 mb-8">
<div class="heal-avatar flex items-center justify-center"><i class="fa fa-smile-o text-white text-2xl"></i></div>
<div>
<h2 class="text-xl font-bold text-gray-800">Good Morning, Friend</h2>
<p class="text-gray-400 text-sm">Take good care of yourself today too</p>
</div>
</div>
<div class="heal-card mb-5">
<div class="flex gap-3 mb-4">
<span class="heal-tag">Meditation</span>
<span class="heal-tag" style="background:#B5E4CA">Sleep Aid</span>
</div>
<h3 class="text-lg font-bold text-gray-800 mb-2">15-Minute Deep Relaxation</h3>
<p class="text-gray-400 text-sm mb-4">Release the day's stress through breathing exercises</p>
<div class="flex items-center gap-2 text-sm text-gray-500">
<i class="fa fa-clock-o"></i><span>15 min</span>
</div>
</div>
<div class="heal-card mb-5">
<h3 class="text-lg font-bold text-gray-800 mb-3">Today's Mood</h3>
<div class="flex justify-around">
<div class="text-center"><div class="text-3xl mb-1">😊</div><div class="text-xs text-gray-500">Happy</div></div>
<div class="text-center"><div class="text-3xl mb-1">😌</div><div class="text-xs text-gray-500">Calm</div></div>
<div class="text-center"><div class="text-3xl mb-1">😴</div><div class="text-xs text-gray-500">Tired</div></div>
<div class="text-center"><div class="text-3xl mb-1">😢</div><div class="text-xs text-gray-500">Down</div></div>
</div>
</div>
<button class="heal-btn w-full text-center">Start Today's Practice</button>
</div>
</body>
</html>
