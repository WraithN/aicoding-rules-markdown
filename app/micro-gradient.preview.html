<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Gradient Light Texture | App Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<style>
.micro-bg{background:linear-gradient(180deg,#FAFBFC,#F5F6F8);min-height:100vh}
.micro-card{background:#fff;border-radius:16px;border:.5px solid rgba(0,0,0,.06);box-shadow:0 2px 8px rgba(0,0,0,.06);padding:16px}
.micro-btn{background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:12px;color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.micro-icon{background:linear-gradient(135deg,#6366F1,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body class="micro-bg max-w-md mx-auto">
<div class="p-6">
<h2 class="text-xl font-bold text-gray-800 mb-1">Today's Expenses</h2>
<p class="text-gray-400 text-sm mb-6">June 11, 2026</p>
<div class="micro-card mb-4 text-center">
<div class="text-3xl font-bold text-gray-800 mb-1">¥ 328.50</div>
<div class="text-sm text-gray-400">-12% from yesterday</div>
</div>
<div class="grid grid-cols-4 gap-3 mb-6">
<div class="micro-card text-center py-4"><i class="fa fa-cutlery micro-icon text-xl mb-2"></i><div class="text-xs text-gray-600">Dining</div></div>
<div class="micro-card text-center py-4"><i class="fa fa-bus micro-icon text-xl mb-2"></i><div class="text-xs text-gray-600">Transport</div></div>
<div class="micro-card text-center py-4"><i class="fa fa-shopping-bag micro-icon text-xl mb-2"></i><div class="text-xs text-gray-600">Shopping</div></div>
<div class="micro-card text-center py-4"><i class="fa fa-ellipsis-h micro-icon text-xl mb-2"></i><div class="text-xs text-gray-600">More</div></div>
</div>
<div class="micro-card mb-4">
<div class="flex justify-between items-center"><span class="text-sm text-gray-600">Lunch · McDonald's</span><span class="font-medium text-gray-800">-¥ 45.00</span></div>
</div>
<div class="micro-card mb-4">
<div class="flex justify-between items-center"><span class="text-sm text-gray-600">Ride · Didi</span><span class="font-medium text-gray-800">-¥ 28.50</span></div>
</div>
<button class="micro-btn w-full py-3.5 font-medium mt-2">Add Entry</button>
</div>
</body>
</html>
